version: 2
updates:
  # Production npm dependencies — weekly check, grouped to avoid PR spam.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Edmonton"
    open-pull-requests-limit: 5
    groups:
      production-minor-patch:
        applies-to: version-updates
        dependency-type: "production"
        update-types: ["minor", "patch"]
      development-minor-patch:
        applies-to: version-updates
        dependency-type: "development"
        update-types: ["minor", "patch"]
    # Security alerts (separate from version updates) come through immediately
    # regardless of the schedule above.
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
      include: "scope"

  # GitHub Actions, if/when we add CI workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
